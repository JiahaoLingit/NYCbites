<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Out & About NYC</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="auth-overlay">
    <h1>Out &amp; About NYC</h1>
    <p>Log in to start planning your free time in the city.</p>
    
    <div class="auth-box">
      <input type="text" id="firstName" placeholder="First Name" />
      <input type="text" id="lastName" placeholder="Last Name" />
      <input type="email" id="authEmail" placeholder="Email" />
      <input type="password" id="authPassword" placeholder="Password" />
      <button id="signUpBtn">Sign Up</button>
      <button id="signInBtn">Sign In</button>
      <button id="signOutBtn" style="display: none;">Sign Out</button>
      <p id="authStatus">Not signed in.</p>
      <a href="schedule.html" id="continueLink" style="display: none;">→ Go to your schedule</a>
    </div>
  </div>
  <div id="availabilitySection">
    <h2>Your Availability</h2>
    <ul id="availabilityList">Loading availability...</ul>
  </div>
  
  <script type="module" src="script.js"></script>
</body>
</html>
